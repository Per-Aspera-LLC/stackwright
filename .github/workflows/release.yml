name: Release

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write
  id-token: write # required for npm provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    # Use startsWith (not contains) to check ONLY the commit title for [skip ci].
    # Squash merges embed individual commit messages in the body, and automated
    # commits (prerelease bumps, etc.) include [skip ci] — which would incorrectly
    # suppress the release workflow if we used contains() on the full body.
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: version packages for release [skip ci]') }}"
    steps:
      - name: Generate PerAsperaCI token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PERASPECRACI_APP_ID }}
          private-key: ${{ secrets.PERASPERA_CI_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: "10.30.3"

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          provenance: true

      - run: pnpm install --frozen-lockfile

      # -----------------------------------------------------------
      # Gate: skip the entire release if there's nothing to publish
      # -----------------------------------------------------------
      - name: Check for releasable changes
        id: check
        run: |
          CHANGESETS=$(find .changeset -name '*.md' ! -name 'README.md' 2>/dev/null | wc -l)
          HAS_PRE=$( [ -f ".changeset/pre.json" ] && echo "true" || echo "false" )
          if [ "$CHANGESETS" -eq 0 ] && [ "$HAS_PRE" = "false" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No pending changesets — nothing to release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Found $CHANGESETS changeset(s), prerelease mode: $HAS_PRE"
          fi

      # -----------------------------------------------------------
      # Version: exit alpha prerelease mode, then consume changesets
      # -----------------------------------------------------------
      - name: Exit prerelease mode
        if: steps.check.outputs.skip != 'true'
        run: |
          if [ -f ".changeset/pre.json" ]; then
            pnpm changeset pre exit
            echo "Exited prerelease mode."
          else
            echo "Not in prerelease mode — skipping."
          fi

      - name: Version packages
        if: steps.check.outputs.skip != 'true'
        run: pnpm changeset version

      # -----------------------------------------------------------
      # Build & publish
      # -----------------------------------------------------------
      - name: Build
        if: steps.check.outputs.skip != 'true'
        run: pnpm build

      - name: Publish to npm
        if: steps.check.outputs.skip != 'true'
        run: |
          for dir in packages/*/; do
            if [ -d "$dir/dist" ]; then
              cd "$dir"
              PKG_NAME=$(node -p "require('./package.json').name")
              echo "Publishing $PKG_NAME..."
              npm publish --provenance --access public || echo "Skipped $PKG_NAME"
              cd - > /dev/null
            fi
          done

      # -----------------------------------------------------------
      # Push version bumps back, then sync dev
      # -----------------------------------------------------------
      - name: Commit and push version bumps
        if: steps.check.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: version packages for release [skip ci]" || echo "No changes to commit"
          git push origin main

      - name: Back-merge into dev
        if: steps.check.outputs.skip != 'true'
        run: |
          git checkout dev
          git pull origin dev
          # -X theirs: main's graduated versions win over dev's stale alphas
          git merge main -X theirs --no-edit -m "chore: back-merge main after release [skip ci]"
          # Re-enter prerelease mode so the next dev push produces alphas
          if [ ! -f ".changeset/pre.json" ]; then
            pnpm changeset pre enter alpha
            git add .changeset/pre.json
            git commit -m "chore: re-enter prerelease mode after back-merge [skip ci]"
          fi
          git push origin dev
