name: Release

on:
    push:
        branches:
            - main

# Versioning is done manually before merging to main (changeset pre exit +
# changeset version). This workflow only publishes — it never writes back to
# the repository, so it works with protected-branch rules and requires no
# elevated token permissions.
permissions:
    contents: read
    id-token: write  # required for npm provenance attestation

jobs:
    release:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: pnpm/action-setup@v3
              with:
                  version: 10

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: "https://registry.npmjs.org"
                  cache: "pnpm"

            - run: pnpm install --frozen-lockfile
            - run: pnpm build

            - name: Publish to npm
              run: pnpm publish -r --provenance --access public --no-git-checks
