name: CI

on:
  push:
    branches: [main, dev]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build
      - run: pnpm test

  scaffold-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build

      - name: Scaffold a test project
        run: node packages/cli/dist/cli.js scaffold /tmp/test-site --title "Test Site" --theme default --json

      - name: Install scaffold dependencies
        run: pnpm install
        working-directory: /tmp/test-site

      - name: Build scaffold output
        run: pnpm build
        working-directory: /tmp/test-site
