name: Sync Template Repo

on:
  push:
    branches: [dev]
    paths:
      - 'packages/cli/templates/scaffold-template/**'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4

      - name: Checkout template repo
        uses: actions/checkout@v4
        with:
          repository: Per-Aspera-LLC/stackwright-template-nextjs
          path: _template-repo
          token: ${{ secrets.TEMPLATE_REPO_PAT }}

      - name: Sync files
        run: |
          TEMPLATE_SRC="packages/cli/templates/scaffold-template"

          # Remove all tracked files in template repo (except .git and README.md)
          find _template-repo -maxdepth 1 -not -name '.git' -not -name 'README.md' -not -name '_template-repo' -not -name '.' | while read f; do
            rm -rf "$f"
          done

          # Copy bundled template files into the template repo
          cp -a "$TEMPLATE_SRC/." _template-repo/

      - name: Check for changes
        id: diff
        working-directory: _template-repo
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        working-directory: _template-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync with stackwright monorepo

          Automated sync from Per-Aspera-LLC/stackwright@${{ github.sha }}"
          git push
