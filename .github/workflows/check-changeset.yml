name: Check for Required Changeset

on:
  pull_request:
    branches:
      - dev

permissions:
  contents: read

jobs:
  check-changeset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup-stackwright

      - name: Validate Changeset Presence
        run: node .github/scripts/check-for-changeset.js
