name: Prerelease Dev

on:
  pull_request:
    branches:
      - dev
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  prerelease:
    runs-on: ubuntu-latest
    if: "${{ !startsWith(github.event.head_commit.message, 'chore: bump prerelease versions [skip ci]') }}"
    steps:
      - name: Generate PerAsperaCI token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.PERASPECRACI_APP_ID }}
          private-key: ${{ secrets.PERASPERA_CI_PRIVATE_KEY }}

      - uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4
        with:
          version: "10.30.3"

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'
          provenance: true

      - run: pnpm install --frozen-lockfile
      - name: Ensure Changeset prerelease mode is entered
        run: |
            PENDING=$(ls .changeset/*.md 2>/dev/null | wc -l)
            if [ ! -f ".changeset/pre.json" ] && [ "$PENDING" -gt 0 ]; then
            pnpm changeset pre enter alpha
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add .changeset/pre.json
            git commit -m "chore: enter prerelease mode [skip ci]"
            git push origin dev
            fi


      - run: pnpm build

      - name: Set git identity for bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Bump prerelease versions
        run: pnpm changeset version

      - name: Push changes back to dev
        run: |
          git add .
          git commit -m "chore: bump prerelease versions [skip ci]" || echo "No changes to commit"
          git push origin dev

      - name: Publish prereleases with tag 'alpha'
        run: |
          for dir in packages/*/; do
            if [ -d "$dir/dist" ]; then
              cd "$dir"
              PKG_NAME=$(node -p "require('./package.json').name")
              echo "Publishing $PKG_NAME..."
              npm publish --provenance --access public --tag alpha || echo "Skipped $PKG_NAME (may already exist)"
              cd - > /dev/null
            fi
          done
