name: Update Visual Snapshots

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to update snapshots on'
        required: true
        default: 'dev'

permissions:
  contents: write
  pull-requests: write

jobs:
  update-snapshots:
    name: Update Visual Snapshots
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Stackwright
        uses: ./.github/actions/setup-stackwright

      # NOTE: Only run visual and smoke tests with --update-snapshots
      # Do NOT run all tests - accessibility tests and e2e tests have different requirements
      - name: Update visual snapshots
        run: >-
          pnpm --filter @stackwright/e2e exec playwright test
          tests/visual.spec.ts
          tests/smoke.spec.ts
          --project=chromium
          --update-snapshots

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'test: update visual baselines'
          title: 'Update Visual Baselines'
          body: 'This PR updates visual regression baselines from CI. Review the changes before merging.'
          branch: update-snapshots
          base: ${{ github.event.inputs.branch || 'dev' }}
          delete-branch: true
