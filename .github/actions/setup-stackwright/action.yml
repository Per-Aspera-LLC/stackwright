name: "Setup Stackwright"
description: "Standardized pnpm/Node setup for Stackwright monorepo"

inputs:
  build:
    description: "Whether to run pnpm build after install"
    required: false
    default: "false"
  relink-bins:
    description: "Whether to re-link bins after build (needed for CLI tools)"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup pnpm
      uses: pnpm/action-setup@v6

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: 22
        cache: "pnpm"

    - name: Install dependencies
      run: |
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          echo "PR detected: clearing stale pnpm store and regenerating lockfile..."
          STORE_PATH="$(pnpm store path)"
          rm -f "$GITHUB_WORKSPACE/pnpm-lock.yaml"
          rm -rf "$STORE_PATH"
          pnpm install
          LF="$GITHUB_WORKSPACE/pnpm-lock.yaml"
          echo "=== Post-install lockfile analysis ==="
          echo "Line count: $(wc -l < "$LF" 2>/dev/null || echo MISSING)"
          echo "--- at line start: $(grep -c '^---' "$LF" 2>/dev/null; true)"
          echo "--- anywhere in file: $(grep -c -- '---' "$LF" 2>/dev/null; true)"
          echo "First 3 lines:"; head -3 "$LF" 2>/dev/null || echo MISSING
          echo "Last 3 lines:"; tail -3 "$LF" 2>/dev/null || echo MISSING
        else
          echo "Branch push detected: using frozen lockfile..."
          pnpm install --frozen-lockfile
        fi
      shell: bash

    - name: Build packages
      if: inputs.build == 'true'
      run: pnpm build
      shell: bash

    - name: Relink bins
      if: inputs.relink-bins == 'true'
      run: pnpm install
      shell: bash
