  - type: faq
    label: faq-demo
    heading:
      text: faq
      textSize: h2
    items:
    - question: What is Stackwright?
      answer: A typed DSL that compiles YAML content files into production-ready Next.js applications. You define pages, layouts,
        and content in YAML — Stackwright handles the rendering.
    - question: Do I need to know React?
      answer: Not for content authoring. YAML content can be written by anyone. When you need custom functionality beyond
        the built-in content types, a React developer can extend the app alongside the YAML-driven pages.
    - question: How does theming and dark mode work?
      answer: Themes are defined in YAML with colors, darkColors, typography, and spacing tokens. Light and dark palettes
        swap automatically based on OS preference, or users can toggle manually via the Sun/Moon button in the header. Define
        both palettes once and every page respects the choice.
    - question: What happens when I outgrow the framework?
      answer: Nothing breaks. The output is a standard Next.js app. A developer opens the repo and starts writing React components
        alongside the YAML pages. No migration, no export, no rewrite.
    - question: Is it free and open source?
      answer: Yes, the core framework is open source under the MIT license.
