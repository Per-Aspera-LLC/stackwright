content:
  content_items:
  - type: main
    label: showcase-hero
    heading:
      text: Content Type Showcase
      textSize: h1
    textBlocks:
    - text: Every content type available in Stackwright, demonstrated live. Each section below is a single YAML block.
      textSize: h6
  - type: grid
    label: grid-demo-2col
    heading:
      text: grid — two-column layout
      textSize: h2
    columns:
    - width: 2
      content_items:
      - type: main
        label: grid-left
        heading:
          text: Composable Layouts
          textSize: h3
        textBlocks:
        - text: The grid content type places any combination of content blocks side by side. Each column holds a full content_items
            array — the same structure as a page.
          textSize: body1
        - text: Width ratios are expressed as fr units. This left column is 2fr, the right is 1fr — giving a 2:1 split.
          textSize: body1
    - width: 1
      content_items:
      - type: code_block
        label: grid-right-code
        language: yaml
        code: "- grid:\n    label: \"my-grid\"\n    columns:\n      - width: 2\n        content_items:\n          - main:\
          \ ...\n      - width: 1\n        content_items:\n          - code_block: ...\n"
  - type: grid
    label: grid-demo-3col
    heading:
      text: grid — three equal columns
      textSize: h2
    background: '#f8f9fa'
    columns:
    - content_items:
      - type: alert
        label: grid-col1-alert
        variant: info
        title: Column 1
        body: Each column stacks its content items vertically, just like a page does.
    - content_items:
      - type: alert
        label: grid-col2-alert
        variant: success
        title: Column 2
        body: Omit the width field and all columns get equal space (1fr each).
    - content_items:
      - type: alert
        label: grid-col3-alert
        variant: tip
        title: Column 3
        body: On narrow screens the columns stack automatically. Set stackBelow to control the breakpoint.
  - type: main
    label: main-demo
    heading:
      text: main
      textSize: h2
    textBlocks:
    - text: The workhorse layout block
      textSize: h5
    - text: Heading, text blocks, an optional image, and optional buttons. Set graphic_position to control image placement.
        Adjust the text-to-image ratio with textToGraphic.
      textSize: body1
    media:
      type: image
      label: main-demo-graphic
      src: ./otterficer-digital.png
      alt: Placeholder — replace with a hero image or product screenshot
      aspect_ratio: 1
      height: 300
    graphic_position: right
    buttons:
    - label: main-demo-btn
      text: Example Button
      textSize: body1
      variant: contained
      href: '#'
  - type: text_block
    label: text-block-demo
    heading:
      text: text_block
      textSize: h2
    background: '#e8f4f8'
    textBlocks:
    - text: Pure text and buttons — no media, no layout complexity
      textSize: h5
    - text: When you don't need an image or graphic positioning, text_block is cleaner than main. Perfect for announcements, callouts, or text-heavy sections that need emphasis.
      textSize: body1
    - text: Use multiple textBlocks with different sizes to create visual hierarchy. Add buttons for calls-to-action. Set a background to make the section stand out.
      textSize: body2
