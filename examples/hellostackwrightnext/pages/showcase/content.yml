  - type: tabbed_content
    label: tabbed-content-demo
    heading:
      text: tabbed_content
      textSize: h2
    tabs:
    - type: main
      label: For Non-Developers
      heading:
        text: Write Content, Not Code
        textSize: h4
      textBlocks:
      - text: Describe what you want to an AI agent. It writes valid YAML, validates it against the schema, and opens a pull
          request. Your developer reviews and merges. No CMS login, no training, no lock-in.
        textSize: body1
    - type: main
      label: For Developers
      heading:
        text: Standard Next.js Under the Hood
        textSize: h4
      textBlocks:
      - text: The output is a Next.js app you own. Add custom React components alongside YAML pages. Use any npm package.
          Deploy anywhere. The framework disappears when you outgrow it — and that is by design.
        textSize: body1
    - type: code_block
      label: The YAML
      language: yaml
      code: "- tabbed_content:\n    label: \"my-tabs\"\n    heading:\n      text: \"Compare Options\"\n      textSize: \"\
        h3\"\n    tabs:\n      - main:\n          label: \"Option A\"\n          heading:\n            text: \"First Option\"\
        \n            textSize: \"h4\"\n          textBlocks:\n            - text: \"Details about option A.\"\n         \
        \     textSize: \"body1\"\n      - main:\n          label: \"Option B\"\n          heading:\n            text: \"\
        Second Option\"\n            textSize: \"h4\"\n          textBlocks:\n            - text: \"Details about option B.\"\
        \n              textSize: \"body1\"\n"
  - type: main
    label: code-block-heading
    heading:
      text: code_block
      textSize: h2
    textBlocks:
    - text: Syntax-highlighted code blocks with line numbers. Supports JavaScript, TypeScript, Python, YAML, HTML, CSS, JSON,
        bash, JSX, and TSX.
      textSize: body1
  - type: code_block
    label: code-block-yaml-demo
    language: yaml
    lineNumbers: true
    background: '#f8f9fa'
    code: "# A Stackwright page defined in YAML\ncontent:\n  content_items:\n    - main:\n        label: \"hello-world\"\n\
      \        heading:\n          text: \"Hello World\"\n          textSize: \"h1\"\n        textBlocks:\n          - text:\
      \ \"My first Stackwright page.\"\n            textSize: \"body1\"\n"
  - type: code_block
    label: code-block-ts-demo
    language: typescript
    lineNumbers: true
    background: '#f8f9fa'
    code: "import { registerContentType } from '@stackwright/core';\nimport { z } from 'zod';\n\n// Register a custom content\
      \ type with Zod validation\nconst chartSchema = z.object({\n  title: z.string(),\n  dataUrl: z.string().url(),\n  height:\
      \ z.number().optional().default(400),\n});\n\ntype ChartProps = z.infer<typeof chartSchema>;\n\nfunction Chart({ title,\
      \ dataUrl, height }: ChartProps) {\n  return <div style={{ height }}>{title}</div>;\n}\n\nregisterContentType('chart',\
      \ chartSchema, Chart);\n"
  - type: code_block
    label: code-block-bash-demo
    language: bash
    background: '#f8f9fa'
    code: '# Scaffold a new Stackwright project

      npx create-stackwright my-site

      cd my-site && pnpm install


      # Start the dev server

      pnpm dev


      # Validate all content before deploying

      pnpm stackwright -- validate-pages

      '
