content:
  content_items:
    - main:
        label: "getting-started-hero"
        heading:
          text: "Getting Started with Stackwright"
          textSize: "h1"
        textBlocks:
          - text: "Learn how to build your first Stackwright application in minutes."
            textSize: "h6"
          - text: "Follow this step-by-step guide to create dynamic, YAML-driven React applications."
            textSize: "body1"

    - main:
        label: "installation-section"
        heading:
          text: "1. Installation"
          textSize: "h2"
        textBlocks:
          - text: "Install the Stackwright CLI and create your first project:"
            textSize: "body1"
          - text: "npm install -g @stackwright/cli\nstackwright create my-app\ncd my-app\nnpm run dev"
            textSize: "body2"
        background: "#f8f9fa"

    - main:
        label: "yaml-config-section"
        heading:
          text: "2. Create YAML Content"
          textSize: "h2"
        textBlocks:
          - text: "Define your page structure using simple YAML configuration:"
            textSize: "body1"
          - text: "Create content/pages/home.yaml and define your page structure with headings, text blocks, buttons, and graphics."
            textSize: "body1"

    - main:
        label: "next-steps"
        heading:
          text: "Next Steps"
          textSize: "h2"
        textBlocks:
          - text: "Explore more advanced features and customization options."
            textSize: "body1"
        buttons:
          - text: "View Documentation"
            textSize: "body1"
            variant: "contained"
            href: "/docs"
          - text: "See Examples"
            textSize: "body1"
            variant: "outlined"
            href: "/examples"