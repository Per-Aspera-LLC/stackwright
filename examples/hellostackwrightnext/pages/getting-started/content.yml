content:
    content_items:
        - main:
              label: "getting-started-hero"
              heading:
                  text: "Getting Started with Stackwright"
                  textSize: "h1"
                  textColor: "secondary"
              textBlocks:
                  - text: "Stackwright is a YAML-driven React framework. You define pages as structured content files — Stackwright handles the components, layout, theming, and static generation."
                    textSize: "h6"
                  - text: "This site is built with Stackwright. Every page you are reading is a YAML file."
                    textSize: "body1"

        - main:
              label: "prerequisites"
              heading:
                  text: "What You Need"
                  textSize: "h2"
              textBlocks:
                  - text: "Node.js 18+, pnpm, and a basic familiarity with Next.js. You do not need to write React components to build pages."
                    textSize: "body1"
              background: "#f8f9fa"

        - main:
              label: "step-clone"
              heading:
                  text: "1. Clone the Example"
                  textSize: "h2"
              textBlocks:
                  - text: "Fork or clone the hellostackwrightnext example — this is the same project you are looking at now."
                    textSize: "body1"

        - code_block:
              label: "step-clone-code"
              language: "bash"
              code: |
                  git clone https://github.com/Per-Aspera-LLC/stackwright.git
                  cd stackwright/examples/hellostackwrightnext
                  pnpm install

        - main:
              label: "step-run"
              heading:
                  text: "2. Run the Dev Server"
                  textSize: "h2"
              textBlocks:
                  - text: "From the monorepo root, build the packages first, then start the example."
                    textSize: "body1"
              background: "#f8f9fa"

        - code_block:
              label: "step-run-code"
              language: "bash"
              code: |
                  pnpm build
                  pnpm dev:example
              background: "#f8f9fa"

        - main:
              label: "step-run-note"
              textBlocks:
                  - text: "The example runs at http://localhost:3000. Hot reload is active for YAML content changes."
                    textSize: "body1"
              heading:
                  text: ""
                  textSize: "body1"
              background: "#f8f9fa"

        - main:
              label: "step-page"
              heading:
                  text: "3. Add a Page"
                  textSize: "h2"
              textBlocks:
                  - text: "Pages live in pages/ as directories containing a content.yml. The directory name becomes the URL slug."
                    textSize: "body1"
                  - text: "A minimal page:"
                    textSize: "body1"

        - code_block:
              label: "step-page-slug"
              language: "text"
              code: "pages/my-page/content.yml  →  /my-page"

        - code_block:
              label: "step-page-code"
              language: "yaml"
              code: |
                  content:
                    content_items:
                      - main:
                          label: "hero"
                          heading:
                            text: "Hello World"
                            textSize: "h1"
                          textBlocks:
                            - text: "My first Stackwright page."
                              textSize: "body1"

        - main:
              label: "step-theme"
              heading:
                  text: "4. Customize Your Theme"
                  textSize: "h2"
              textBlocks:
                  - text: "Open stackwright.yml in the project root. The customTheme block controls your color palette and typography. Changes apply across every page instantly."
                    textSize: "body1"
              background: "#f8f9fa"

        - code_block:
              label: "step-theme-code"
              language: "yaml"
              code: |
                  customTheme:
                    colors:
                      primary: "#fdc13c"
                      secondary: "#1a9fd4"
                      background: "#fdfdfd"
                      text: "#393837"
                    typography:
                      fontFamily:
                        primary: Inter
                        secondary: Cinzel
              background: "#f8f9fa"

        - main:
              label: "step-images"
              heading:
                  text: "5. Add Images"
                  textSize: "h2"
              textBlocks:
                  - text: "Place images in the same directory as content.yml and reference them with a relative path. Stackwright copies them to public/ and rewrites paths automatically at build time."
                    textSize: "body1"

        - code_block:
              label: "step-images-code"
              language: "yaml"
              code: |
                  media:
                    type: "image"
                    src: ./my-image.png
                    alt: "Description of the image"
                    height: 350
                    aspect_ratio: 1.5

        - main:
              label: "next-steps"
              heading:
                  text: "Where to Go Next"
                  textSize: "h2"
              textBlocks:
                  - text: "See all available content types in the Showcase, read the About page, or explore the source on GitHub."
                    textSize: "body1"
              buttons:
                  - label: "showcase-btn"
                    text: "Content Type Showcase"
                    textSize: "body1"
                    variant: "contained"
                    href: "/showcase"
                    bgColor: "secondary"
                    textColor: "primary"
                  - label: "about-btn"
                    text: "About Stackwright"
                    textSize: "body1"
                    variant: "outlined"
                    href: "/about"
                  - label: "github-btn"
                    text: "View on GitHub"
                    textSize: "body1"
                    variant: "outlined"
                    href: "https://github.com/Per-Aspera-LLC/stackwright/"
              background: "#f8f9fa"
