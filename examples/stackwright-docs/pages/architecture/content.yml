    background: surface
    items:
    - icon:
        type: icon
        src: Box
        height: 40
        label: core-icon
      heading: '@stackwright/core'
      description: '**The engine.** YAMLвҶ’React compilation, component registry, content rendering, hooks, utilities. Exports: `renderContent()`, `stackwrightRegistry`, `registerComponent()`.'
    - icon:
        type: icon
        src: Layers
        height: 40
        label: types-icon
      heading: '@stackwright/types'
      description: '**The grammar.** Zod schemas for all content types, TypeScript types, JSON schemas for IDE support. The source of truth for what''s valid YAML.'
    - icon:
        type: icon
        src: Code
        height: 40
        label: nextjs-icon
      heading: '@stackwright/nextjs'
      description: '**The adapter.** Next.js-specific components: `StackwrightImage`, `StackwrightLink`, `createStackwrightNextConfig()`. Handles App Router and Pages Router.'
    - icon:
        type: icon
        src: Palette
        height: 40
        label: themes-icon
      heading: '@stackwright/themes'
      description: '**The skin.** CSS custom properties theming, `ThemeProvider`, `ColorModeScript` for dark mode. Your stackwright.yml colors become CSS variables.'
    - icon:
        type: icon
        src: Hammer
        height: 40
        label: build-icon
      heading: '@stackwright/build-scripts'
      description: '**The compiler.** Prebuild pipeline: YAMLвҶ’JSON compilation, image copying, search index generation. Runs before `next build` via predev/prebuild hooks.'
    - icon:
        type: icon
        src: Terminal
        height: 40
        label: cli-icon
      heading: '@stackwright/cli'
      description: '**The CLI.** `npx launch-stackwright`, `stackwright validate`, `stackwright preview`. Developer interface for scaffolding and testing.'
    - icon:
        type: icon
        src: Bot
        height: 40
        label: mcp-icon
      heading: '@stackwright/mcp'
