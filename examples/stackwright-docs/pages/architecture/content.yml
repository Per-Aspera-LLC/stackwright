    code: "stackwright/\nв”ңв”Җв”Җ packages/\nв”Ӯ   в”ңв”Җв”Җ core/                    # YAMLвҶ’React engine\nв”Ӯ   в”Ӯ   в””в”Җв”Җ src/\nв”Ӯ   в”Ӯ       в”ңв”Җв”Җ components/      # React components\nв”Ӯ   в”Ӯ       в”Ӯ   в”ңв”Җв”Җ base/        # Content types\nв”Ӯ   в”Ӯ       в”Ӯ   в”ңв”Җв”Җ structural/  # Layout (PageLayout, NavSidebar)\nв”Ӯ   в”Ӯ       в”Ӯ   в”ңв”Җв”Җ narrative/   # Carousel, Timeline\nв”Ӯ   в”Ӯ       в”Ӯ   в””в”Җв”Җ content/     # Map, etc.\nв”Ӯ   в”Ӯ       в”ңв”Җв”Җ config/         # Default config\nв”Ӯ   в”Ӯ       в””в”Җв”Җ utils/          # Registries, renderers\nв”Ӯ   в”Ӯ\nв”Ӯ   в”ңв”Җв”Җ types/                  # Zod schemas, TypeScript types\nв”Ӯ   в”Ӯ   в””в”Җв”Җ src/\nв”Ӯ   в”Ӯ       в”ңв”Җв”Җ types/          # Content schemas\nв”Ӯ   в”Ӯ       в””в”Җв”Җ schemas/         # JSON schemas\nв”Ӯ   в”Ӯ\nв”Ӯ   в”ңв”Җв”Җ nextjs/                 # Next.js adapter\nв”Ӯ   в”Ӯ   в””в”Җв”Җ src/components/     # NextImage, NextLink, etc.\nв”Ӯ   в”Ӯ\nв”Ӯ   в”ңв”Җв”Җ themes/                 # Theme system\nв”Ӯ   в”Ӯ   в””в”Җв”Җ src/ThemesProvider.tsx\nв”Ӯ   в”Ӯ\nв”Ӯ   в”ңв”Җв”Җ build-scripts/          # Prebuild pipeline\nв”Ӯ   в”Ӯ   в””в”Җв”Җ src/\nв”Ӯ   в”Ӯ       в”ңв”Җв”Җ prebuild.ts     # Main entry\nв”Ӯ   в”Ӯ       в””в”Җв”Җ ...             # Transformers\nв”Ӯ   в”Ӯ\nв”Ӯ   в”ңв”Җв”Җ cli/                    # Developer CLI\nв”Ӯ   в”Ӯ   в””в”Җв”Җ src/commands/       # init, validate, etc.\nв”Ӯ   в”Ӯ\nв”Ӯ   в”ңв”Җв”Җ mcp/                    # MCP server\nв”Ӯ   в”Ӯ   в””в”Җв”Җ src/tools/           # AI authoring tools\nв”Ӯ   в”Ӯ\nв”Ӯ   в”ңв”Җв”Җ icons/                  # Icon registry\nв”Ӯ   в”Ӯ   в””в”Җв”Җ src/registry.ts\nв”Ӯ   в”Ӯ\nв”Ӯ   в””в”Җв”Җ ui-shadcn/              # Radix + Tailwind\nв”Ӯ       в””в”Җв”Җ src/components/\nв”Ӯ\nв””в”Җв”Җ examples/\n    в””в”Җв”Җ stackwright-docs/        # This documentation site\n        в”ңв”Җв”Җ pages/              # YAML page files\n        в”Ӯ   в”ңв”Җв”Җ index/\n        в”Ӯ   в”ңв”Җв”Җ getting-started/\n        в”Ӯ   в”ңв”Җв”Җ content-types/\n        в”Ӯ   в””в”Җв”Җ ...\n        в”ңв”Җв”Җ stackwright.yml     # Theme config\n        в””в”Җв”Җ public/\n            в””в”Җв”Җ images/         # Co-located images"
  - type: text_block
    label: package-details-heading
    heading:
      text: Package Details
      textSize: h2
    textBlocks:
    - text: 'Here''s what each package does:'
