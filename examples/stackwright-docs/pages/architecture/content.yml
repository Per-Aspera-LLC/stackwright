content:
  meta:
    title: "Architecture | Stackwright"
    description: "How Stackwright compiles YAML into production Next.js apps. Technical deep-dive."

  content_items:
    # Hero
    - type: main
      label: hero
      heading:
        text: "Architecture 🏗️"
        textSize: h1
      textBlocks:
        - text: "Stackwright is a typed DSL that compiles YAML into production-ready Next.js applications."
          textSize: h3
        - text: "Visual rendering + constrained grammar + AI iteration = non-technical people building enterprise apps that are safe by construction."
          textSize: body1
      background: background

    # The Big Picture
    - type: text_block
      label: big-picture-heading
      heading:
        text: "The Big Picture"
        textSize: h2
      textBlocks:
        - text: "Stackwright transforms your intent into a working app through a predictable pipeline:"
          textSize: body1
      background: background

    - type: code_block
      label: big-picture-diagram
      language: text
      lineNumbers: false
      code: |
        ┌─────────────────────────────────────────────────────────────────────────┐
        │                         STACKWRIGHT PIPELINE                            │
        └─────────────────────────────────────────────────────────────────────────┘
        ┌──────────┐      ┌──────────┐      ┌──────────┐      ┌──────────┐
        │  YOUR    │      │PREBUILD  │      │  JSON    │      │ NEXT.js  │
        │  YAMl    │ ───▶ │          │ ───▶ │  DATA    │ ───▶ │          │
        │  FILES   │      │ compiles │      │  (static)│      │  SSG     │
        └──────────┘      └──────────┘      └──────────┘      └────┬─────┘
                                                                      │
                                                                      ▼
                    ┌──────────────────────────────────────────────────────────┐
                    │                        OUTPUT                           │
                    │  ┌──────────┐   ┌──────────┐   ┌──────────┐             │
                    │  │  Static  │   │ Theme    │   │ Typed    │             │
                    │  │  HTML    │ + │ CSS      │ + │ React    │ = 🚀 Fast   │
                    │  └──────────┘   └──────────┘   └──────────┘   Web Apps   │
                    └──────────────────────────────────────────────────────────┘

    # Data Flow
    - type: text_block
      label: flow-heading
      heading:
        text: "Data Flow"
        textSize: h2
      textBlocks:
        - text: "Here's what happens when you build a Stackwright site:"
          textSize: body1
      background: background

    - type: code_block
      label: data-flow-diagram
      language: text
      lineNumbers: false
      code: |
        ┌─────────────────────────────────────────────────────────────────────┐
        │                          REQUEST FLOW                              │
        └─────────────────────────────────────────────────────────────────────┘
        Browser Request
               │
               ▼
        ┌─────────────────┐
        │   Next.js       │
        │   getStaticProps│
        └────────┬────────┘
                 │
                 ▼
        ┌─────────────────┐
        │  JSON Loader    │
        │ (no fs needed!) │
        └────────┬────────┘
                 │
                 ▼
        ┌─────────────────┐
        │   Zod Schema    │
        │   Validation    │
        └────────┬────────┘
                 │  Valid? ──▶ Yes ──▶ Continue
                 │             │
                 │             No ──▶ Build Error (caught early!)
                 ▼
        ┌─────────────────┐
        │ ContentRenderer │
        └────────┬────────┘
                 │
                 ▼
        ┌─────────────────┐
        │  ThemeProvider  │
        │  (CSS Variables)│
        └────────┬────────┘
                 │
                 ▼
        ┌─────────────────┐
        │  Component      │
        │  Registry       │
        └────────┬────────┘
                 │
                 ▼
              HTML 🎉

    # YAML → JSON Transformation
    - type: text_block
      label: yaml-json-heading
      heading:
        text: "YAML → JSON Transformation"
        textSize: h2
      textBlocks:
        - text: "The prebuild step compiles your YAML into static JSON. Here's what that looks like:"
          textSize: body1
      background: background

    - type: code_block
      label: yaml-input
      language: yaml
      lineNumbers: true
      code: |
        content:
          content_items:
            - type: main
              label: hero
              heading:
                text: "Hello, World!"
                textSize: h1
              textBlocks:
                - text: "Welcome to my site."
                  textSize: body1
              buttons:
                - text: "Get Started"
                  href: /getting-started
                  variant: contained

    - type: text_block
      label: arrow-1
      textBlocks:
        - text: "⬇️ prebuild transforms to"
          textSize: caption
      background: background

    - type: code_block
      label: json-output
      language: json
      lineNumbers: true
      code: |
        {
          "content": {
            "content_items": [{
              "type": "main",
              "label": "hero",
              "heading": {
                "text": "Hello, World!",
                "textSize": "h1"
              },
              "textBlocks": [{
                "text": "Welcome to my site.",
                "textSize": "body1"
              }],
              "buttons": [{
                "text": "Get Started",
                "href": "/getting-started",
                "variant": "contained"
              }]
            }]
          }
        }

    - type: alert
      label: no-runtime-fs
      variant: info
      title: "No Runtime Filesystem"
      body: "The JSON is pre-generated at build time. Next.js serves static files — no fs.readFile at runtime. This makes Stackwright apps compatible with edge functions, CDN hosting, and serverless environments."
      background: surface

    # Package Architecture
    - type: text_block
      label: packages-heading
      heading:
        text: "Package Architecture"
        textSize: h2
      textBlocks:
        - text: "Stackwright is a pnpm monorepo with 10 packages. Here's how they relate:"
          textSize: body1
      background: background

    - type: code_block
      label: dependency-diagram
      language: text
      lineNumbers: false
      code: |
        ┌─────────────────────────────────────────────────────────────────────────┐
        │                        PACKAGE DEPENDENCIES                           │
        └─────────────────────────────────────────────────────────────────────────┘
                            ┌─────────────────┐
                            │@stackwright/types│◀── Base: Zod schemas, TypeScript types
                            └────────┬────────┘
                                     │
                   ┌─────────────────┼─────────────────┬─────────────────┐
                   │                 │                 │                 │
                   ▼                 ▼                 ▼                 ▼
            ┌─────────────┐  ┌─────────────┐  ┌─────────────┐  ┌─────────────┐
            │  @stackwright│  │  @stackwright│  │  @stackwright│  │  @stackwright│
            │  -core       │  │  -nextjs    │  │  -cli       │  │  -mcp       │
            │             │  │             │  │             │  │             │
            │ Components  │  │ Next.js     │  │ CLI tools   │  │ MCP server  │
            │ Registry    │  │ Adapter     │  │ Validation  │  │ AI tools    │
            └──────┬──────┘  └──────┬──────┘  └──────┬──────┘  └─────────────┘
                   │                 │                 │
                   │                 │                 │
                   ▼                 ▼                 ▼
            ┌─────────────┐  ┌─────────────┐  ┌─────────────┐
            │  @stackwright│  │  @stackwright│  │  @stackwright│
            │  -themes    │  │  -build-    │  │  -icons     │
            │             │  │  -scripts   │  │             │
            │ Theme system│  │ Prebuild    │  │ Lucide icon │
            │ CSS vars    │  │ pipeline    │  │ registry    │
            └─────────────┘  └─────────────┘  └─────────────┘
                   │
                   ▼
            ┌─────────────┐
            │  @stackwright│
            │  -ui-shadcn  │
            │             │
            │ Radix + Tail│
            └─────────────┘

    # File Structure
    - type: text_block
      label: file-structure-heading
      heading:
        text: "File Structure"
        textSize: h2
      textBlocks:
        - text: "Where everything lives in the monorepo:"
          textSize: body1
      background: background

    - type: code_block
      label: file-structure-tree
      language: text
      lineNumbers: false
      code: |
        stackwright/
        ├── packages/
        │   ├── core/                    # YAML→React engine
        │   │   └── src/
        │   │       ├── components/      # React components
        │   │       │   ├── base/        # Content types
        │   │       │   ├── structural/  # Layout (PageLayout, NavSidebar)
        │   │       │   ├── narrative/   # Carousel, Timeline
        │   │       │   └── content/     # Map, etc.
        │   │       ├── config/          # Default config
        │   │       └── utils/           # Registries, renderers
        │   │
        │   ├── types/                  # Zod schemas, TypeScript types
        │   │   └── src/
        │   │       ├── types/          # Content schemas
        │   │       └── schemas/         # JSON schemas
        │   │
        │   ├── nextjs/                 # Next.js adapter
        │   │   └── src/components/     # NextImage, NextLink, etc.
        │   │
        │   ├── themes/                 # Theme system
        │   │   └── src/ThemesProvider.tsx
        │   │
        │   ├── build-scripts/          # Prebuild pipeline
        │   │   └── src/
        │   │       ├── prebuild.ts     # Main entry
        │   │       └── ...             # Transformers
        │   │
        │   ├── cli/                    # Developer CLI
        │   │   └── src/commands/       # init, validate, etc.
        │   │
        │   ├── mcp/                    # MCP server
        │   │   └── src/tools/          # AI authoring tools
        │   │
        │   ├── icons/                  # Icon registry
        │   │   └── src/registry.ts
        │   │
        │   └── ui-shadcn/              # Radix + Tailwind
        │       └── src/components/
        │
        └── examples/
            └── stackwright-docs/        # This documentation site
                ├── pages/              # YAML page files
                │   ├── index/
                │   ├── getting-started/
                │   ├── content-types/
                │   └── ...
                ├── stackwright.yml     # Theme config
                └── public/
                    └── images/         # Co-located images

    # Package Details
    - type: text_block
      label: package-details-heading
      heading:
        text: "Package Details"
        textSize: h2
      textBlocks:
        - text: "Here's what each package does:"
          textSize: body1
      background: background

    - type: feature_list
      label: package-details
      columns: 2
      background: surface
      items:
        - icon:
            type: icon
            src: Box
            height: 40
            label: core-icon
          heading: "@stackwright/core"
          description: "**The engine.** YAML→React compilation, component registry, content rendering, hooks, utilities. Exports: `renderContent()`, `stackwrightRegistry`, `registerComponent()`."
        - icon:
            type: icon
            src: Layers
            height: 40
            label: types-icon
          heading: "@stackwright/types"
          description: "**The grammar.** Zod schemas for all content types, TypeScript types, JSON schemas for IDE support. The source of truth for what's valid YAML."
        - icon:
            type: icon
            src: Code
            height: 40
            label: nextjs-icon
          heading: "@stackwright/nextjs"
          description: "**The adapter.** Next.js-specific components: `StackwrightImage`, `StackwrightLink`, `createStackwrightNextConfig()`. Handles App Router and Pages Router."
        - icon:
            type: icon
            src: Palette
            height: 40
            label: themes-icon
          heading: "@stackwright/themes"
          description: "**The skin.** CSS custom properties theming, `ThemeProvider`, `ColorModeScript` for dark mode. Your stackwright.yml colors become CSS variables."
        - icon:
            type: icon
            src: Hammer
            height: 40
            label: build-icon
          heading: "@stackwright/build-scripts"
          description: "**The compiler.** Prebuild pipeline: YAML→JSON compilation, image copying, search index generation. Runs before `next build` via predev/prebuild hooks."
        - icon:
            type: icon
            src: Terminal
            height: 40
            label: cli-icon
          heading: "@stackwright/cli"
          description: "**The CLI.** `npx launch-stackwright`, `stackwright validate`, `stackwright preview`. Developer interface for scaffolding and testing."
        - icon:
            type: icon
            src: Bot
            height: 40
            label: mcp-icon
          heading: "@stackwright/mcp"
          description: "**The AI bridge.** MCP server exposing content authoring tools, visual rendering preview, git workflow to AI agents. Enables the Otter Raft."
        - icon:
            type: icon
            src: Image
            height: 40
            label: icons-icon
          heading: "@stackwright/icons"
          description: "**The icons.** Lucide icon registry. `registerDefaultIcons()` makes all Lucide icons available by name in YAML. Add custom icons the same way."
        - icon:
            type: icon
            src: LayoutDashboard
            height: 40
            label: shadcn-icon
          heading: "@stackwright/ui-shadcn"
          description: "**The components.** Radix UI primitives styled with Tailwind CSS: Accordion, Tabs, Dialog, etc. More flexible than core components for complex UI."

    # Component Registry
    - type: text_block
      label: registry-heading
      heading:
        text: "Component Registry"
        textSize: h2
      textBlocks:
        - text: "The component registry maps YAML `type` values to React components:"
          textSize: body1
      background: background

    - type: code_block
      label: registry-example
      language: typescript
      lineNumbers: true
      code: |
        // How it works internally:

        // 1. Components register themselves
        export const componentRegistry = {
          'main': MainContentGrid,
          'text_block': TextBlockGrid,
          'carousel': Carousel,
          'video': Media,
          'map': Map,
          // ... 15 more
        };

        // 2. ContentRenderer looks up the type
        function renderContentItem(contentItem) {
          const Component = componentRegistry[contentItem.type];
          return <Component {...contentItem} />;
        }

        // 3. You can add custom components
        registerComponent('my-custom-type', MyCustomComponent);

        // 4. YAML maps to component
        // - type: main          → MainContentGrid
        // - type: video         → Media
        // - type: my-custom     → MyCustomComponent (custom!)

    - type: alert
      label: registry-tip
      variant: tip
      title: "Custom Components"
      body: "Add your own content types with `registerComponent()`. The schema validation and theme system work automatically. The Otter Raft uses this to generate validated YAML."
      background: surface

    # Safe by Construction
    - type: text_block
      label: safety-heading
      heading:
        text: "Safe by Construction"
        textSize: h2
      textBlocks:
        - text: "Stackwright's constrained grammar creates a fundamentally different security posture:"
          textSize: body1
      background: background

    - type: feature_list
      label: safety-features
      columns: 2
      background: surface
      items:
        - icon:
            type: icon
            src: Shield
            height: 40
            label: bounded-icon
          heading: "Bounded Expressiveness"
          description: "The Zod schema defines exactly what behaviors are possible. No escape hatch to arbitrary code execution. You audit the framework once — every app is safe."
        - icon:
            type: icon
            src: CheckCircle
            height: 40
            label: build-time-icon
          heading: "Build-Time Validation"
          description: "Every content change is validated against the schema before it reaches the browser. Bad YAML fails the build, not the user."
        - icon:
            type: icon
            src: Search
            height: 40
            label: auditable-icon
          heading: "Auditable Surface Area"
          description: "Security review reduces to reviewing the component library — a fixed, bounded codebase. Not thousands of YAML files."
        - icon:
            type: icon
            src: Bot
            height: 40
            label: safe-ai-icon
          heading: "Safe AI Generation"
          description: "When an AI agent generates YAML, it literally cannot express unsafe behavior. The schema is the security policy."

    # Common Extension Points
    - type: text_block
      label: extensions-heading
      heading:
        text: "Common Extension Points"
        textSize: h2
      textBlocks:
        - text: "Stackwright apps are standard Next.js apps. Extend freely:"
          textSize: body1
      background: background

    - type: grid
      label: extension-points
      gap: 1rem
      background: background
      columns:
        - width: 50
          content_items:
            - type: text_block
              label: custom-components
              background: surface
              heading:
                text: "Custom Components"
                textSize: h4
              textBlocks:
                - text: "Add React components anywhere in the page:"
                  textSize: body2
                - text: "```tsx"
                  textSize: caption
                - text: "// pages/index.tsx"
                  textSize: caption
                - text: "<PageLayout {...props}>"
                  textSize: caption
                - text: "  <MyCustomWidget />"
                  textSize: caption
                - text: "</PageLayout>"
                  textSize: caption
        - width: 50
          content_items:
            - type: text_block
              label: custom-content-types
              background: surface
              heading:
                text: "Custom Content Types"
                textSize: h4
              textBlocks:
                - text: "Register new YAML types:"
                  textSize: body2
                - text: "```tsx"
                  textSize: caption
                - text: "registerComponent("
                  textSize: caption
                - text: "  'my-type',"
                  textSize: caption
                - text: "  MyComponent"
                  textSize: caption
                - text: ");"
                  textSize: caption
        - width: 50
          content_items:
            - type: text_block
              label: custom-providers
              background: surface
              heading:
                text: "Custom Providers"
                textSize: h4
              textBlocks:
                - text: "Add React context providers:"
                  textSize: body2
                - text: "```tsx"
                  textSize: caption
                - text: "<MyProvider>"
                  textSize: caption
                - text: "  <PageLayout {...props} />"
                  textSize: caption
                - text: "</MyProvider>"
                  textSize: caption
        - width: 50
          content_items:
            - type: text_block
              label: custom-prebuild
              background: surface
              heading:
                text: "Custom Prebuild"
                textSize: h4
              textBlocks:
                - text: "Extend the prebuild pipeline:"
                  textSize: body2
                - text: "```ts"
                  textSize: caption
                - text: "// stackwright.yml"
                  textSize: caption
                - text: "prebuild:"
                  textSize: caption
                - text: "  hooks:"
                  textSize: caption
                - text: "    afterCompile: myTransform"
                  textSize: caption

    # CTA Footer
    - type: main
      label: cta
      heading:
        text: "See Also"
        textSize: h2
      textBlocks:
        - text: "Now that you understand how it works, start building:"
          textSize: body1
      buttons:
        - text: "Get Started"
          textSize: button
          variant: contained
          href: /getting-started
          bgColor: accent
        - text: "Content Types"
          textSize: button
          variant: outlined
          href: /content-types
        - text: "Otter Raft"
          textSize: button
          variant: outlined
          href: /otter-raft
      background: background
