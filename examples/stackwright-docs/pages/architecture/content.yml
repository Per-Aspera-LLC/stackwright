  - type: text_block
    label: registry-heading
    heading:
      text: Component Registry
      textSize: h2
    textBlocks:
    - text: 'The component registry maps YAML `type` values to React components:'
      textSize: body1
    background: background
  - type: code_block
    label: registry-example
    language: typescript
    lineNumbers: true
    code: "// How it works internally:\n\n// 1. Components register themselves\nexport const componentRegistry = {\n  'main': MainContentGrid,\n  'text_block': TextBlockGrid,\n  'carousel': Carousel,\n  'video': Media,\n  'map': Map,\n  // ... 15 more\n};\n\n// 2. ContentRenderer looks up the type\nfunction renderContentItem(contentItem) {\n  const Component = componentRegistry[contentItem.type];\n  return <Component {...contentItem} />;\n}\n\n// 3. You can add custom components\nregisterComponent('my-custom-type', MyCustomComponent);\n\n// 4. YAML maps to component\n// - type: main          вҶ’ MainContentGrid\n// - type: video         вҶ’ Media\n// - type: my-custom     вҶ’ MyCustomComponent (custom!)"
  - type: alert
    label: registry-tip
    variant: tip
    title: Custom Components
    body: Add your own content types with `registerComponent()`. The schema validation and theme system work automatically. The Otter Raft uses this to generate validated YAML.
    background: surface
  - type: text_block
    label: safety-heading
    heading:
      text: Safe by Construction
      textSize: h2
    textBlocks:
    - text: 'Stackwright''s constrained grammar creates a fundamentally different security posture:'
      textSize: body1
    background: background
  - type: feature_list
    label: safety-features
    columns: 2
    background: surface
    items:
    - icon:
        type: icon
        src: Shield
        height: 40
        label: bounded-icon
      heading: Bounded Expressiveness
      description: The Zod schema defines exactly what behaviors are possible. No escape hatch to arbitrary code execution. You audit the framework once вҖ” every app is safe.
    - icon:
        type: icon
        src: CheckCircle
        height: 40
        label: build-time-icon
      heading: Build-Time Validation
      description: Every content change is validated against the schema before it reaches the browser. Bad YAML fails the build, not the user.
    - icon:
        type: icon
        src: Search
        height: 40
        label: auditable-icon
      heading: Auditable Surface Area
      description: Security review reduces to reviewing the component library вҖ” a fixed, bounded codebase. Not thousands of YAML files.
    - icon:
        type: icon
        src: Bot
        height: 40
        label: safe-ai-icon
      heading: Safe AI Generation
      description: When an AI agent generates YAML, it literally cannot express unsafe behavior. The schema is the security policy.
