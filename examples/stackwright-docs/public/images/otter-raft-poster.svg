<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a365d"/>
      <stop offset="100%" style="stop-color:#2d3748"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>
  
  <!-- Otter silhouette -->
  <ellipse cx="640" cy="380" rx="180" ry="160" fill="#d4af37" opacity="0.3"/>
  <ellipse cx="640" cy="420" rx="120" ry="100" fill="#d4af37" opacity="0.4"/>
  
  <!-- Play button circle -->
  <circle cx="640" cy="360" r="80" fill="#d4af37"/>
  <polygon points="620,330 620,390 670,360" fill="#1a365d"/>
  
  <!-- Text -->
  <text x="640" y="520" text-anchor="middle" font-family="Inter, sans-serif" font-size="32" fill="white" font-weight="600">
    🎬 Watch the Otter Raft Demo
  </text>
  <text x="640" y="560" text-anchor="middle" font-family="Inter, sans-serif" font-size="20" fill="#a0aec0">
    Video coming soon - The otters are filming!
  </text>
  
  <!-- Otters text -->
  <text x="640" y="620" text-anchor="middle" font-family="Inter, sans-serif" font-size="48" fill="#d4af37">
    🦦 🦦 🦦 🦦
  </text>
</svg>
