title: "Stackwright"
meta:
  description: "YAML is the syntax. The schema is the safety net. AI writes the code. From API spec to working Next.js app in hours — safe by construction."

appBar:
  titleText: "Stackwright"
  backgroundColor: "primary"
  textColor: "#1A1A2E"   # Dark navy for readability on yellow
  colorModeToggle: true
  logo:
    type: image
    src: ./stackwright-logo.png
    height: 40
    width: 40

navigation:
  - label: "🦦 Home"
    href: "/"
  - label: "🚀 Getting Started"
    href: "/getting-started"
  - label: "⌨️ CLI"
    href: "/cli"
  - label: "🤖 Otter Raft"
    href: "/otter-raft"

# Search configuration (Cmd+K to open)
search:
  enabled: true
  placeholder: "Search docs... ⌘K"

# Sidebar navigation (persistent left sidebar)
sidebar:
  navigation:
    - label: "📖 Documentation"
      href: "/getting-started"
    - label: "🚀 Getting Started"
      href: "/getting-started"
    - label: "📦 Content Types"
      href: "/content-types"
    - label: "🧪 Showcase"
      href: "/showcase"
    - label: "🏗️ Architecture"
      href: "/architecture"
    - label: "⌨️ CLI Reference"
      href: "/cli"
    - label: "🤖 Otter Raft"
      href: "/otter-raft"
    - label: "🔐 Pro"
      href: "/pro"
    - label: "🙏 Acknowledgements"
      href: "/acknowledgements"

  collapsed: false
  width: 260
  mobileBreakpoint: 768

footer:
  backgroundColor: "primary"
  textColor: "text"
  copyright: "Built with Stackwright 🦦"
  links:
    - label: "GitHub"
      href: "https://github.com/Per-Aspera-LLC/stackwright"
    - label: "Source for this Site"
      href: "https://github.com/Per-Aspera-LLC/stackwright/tree/main/examples/stackwright-docs"

customTheme:
  id: "stackwright-docs"
  name: "Stackwright Docs"
  description: "Dark-mode-first documentation theme with golden yellow accents and monospace headings"
  colors:
    primary: "#FCC03E"   # Safety Yellow
    secondary: "#4FC3F7"
    accent: "#F59E0B"   # Amber - slightly darker accent
    background: "#0B1F3A"
    surface: "#1A2C46"
    text: "#FFFFFF"
    textSecondary: "#B0BEC5"
  darkColors:
    primary: "#D97706"   # Amber 600 - darker for dark mode
    secondary: "#0288D1"
    accent: "#F59E0B"   # Amber 500
    background: "#FDFDFD"
    surface: "#F5F5F5"
    text: "#1A1A2E"
    textSecondary: "#666666"
  typography:
    fontFamily:
      primary: "JetBrains Mono"
      secondary: "Inter"
    scale:
      xs: "0.75rem"
      sm: "0.875rem"
      base: "1rem"
      lg: "1.125rem"
      xl: "1.25rem"
      2xl: "1.5rem"
      3xl: "1.875rem"
  spacing:
    xs: "0.5rem"
    sm: "0.75rem"
    md: "1rem"
    lg: "1.5rem"
    xl: "2rem"
    2xl: "3rem"
